# Design Jarvis Configuration
# Edit this file to customize your design project settings.
# Docs: https://github.com/nicepkg/design-jarvis

project:
  name: "My Product"

# Design tool adapter — currently only "figma" is supported
adapter: "figma"

# Design system tokens and libraries
designSystem:
  name: "My Design System"
  figma:
    componentLibrary: ""     # Figma file key for your component library
    iconLibrary: ""          # Figma file key for your icon library
  tokens:
    brandColor: "#0078D4"
    fontFamily: "Inter"
    fontWeights: [400, 600, 700]
    spacingUnit: 4
    cornerRadius:
      small: 4
      medium: 8
      large: 12
  screenSize: [1920, 1080]

# Content style guide
# Options: "microsoft" | "google" | "apple" | "custom"
contentStyle: "google"
# customStyleGuide: "./docs/style-guide.md"

# Agent configuration
agents:
  paths: [".github/agents"]
  qualityGate: "Design Lead"
  required: ["Design Jarvis", "Design Lead", "Design Ops"]

# Review mode
# "unified"  — Design Reviewer checks a11y + content + tokens in one pass (default)
# "parallel" — Separate specialist agents for each review domain
review:
  mode: "unified"

# Skill paths
skills:
  paths: [".skills"]

# Memory system
memory:
  root: ".jarvis/memory"
  crossProjectLearning: true
  auto_checkpoint: true
